# Site Settings
title: My Awesome Blog
email: hello@example.com
description: >-
  A modern, customizable blog showcasing the latest in web development,
  design trends, and creative thinking. Built with Jekyll and love.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://example.com" # the base hostname & protocol for your site
twitter_username: yourusername
github_username: yourusername
linkedin_username: yourusername

# Author Information
author:
  name: John Doe
  email: john@example.com
  bio: >-
    Full-stack developer, tech enthusiast, and occasional blogger.
    Passionate about clean code and beautiful design.
  avatar: /assets/images/avatar.jpg
  location: San Francisco, CA
  website: https://example.com

# Theme Configuration
theme: minima
minima:
  skin: dark # Options: auto, classic, dark, solarized
  date_format: "%b %-d, %Y"
  social_links:
    twitter: yourusername
    github: yourusername
    linkedin: yourusername
    rss: rss
    instagram: yourusername
    youtube: yourchannel

# Build Settings
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/
timezone: Asia/Jakarta

# Pagination
paginate: 10
paginate_path: "/page:num/"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-gist
  - jekyll-coffeescript
  - jekyll-assets

# SEO Settings
twitter:
  username: yourusername
  card: summary_large_image

facebook:
  app_id: 123456789
  publisher: 123456789

social:
  name: John Doe
  links:
    - https://twitter.com/yourusername
    - https://github.com/yourusername
    - https://linkedin.com/in/yourusername

# Google Analytics
google_analytics: UA-XXXXXXXXX-X

# Disqus Comments
disqus:
  shortname: yourblog

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:path/
  testimonials:
    output: false

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "John Doe"
      comments: true
      share: true
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
      author: "John Doe"

# Excluded files
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - README.md
  - LICENSE

# Include files
include:
  - _pages

# Sass Configuration
sass:
  sass_dir: _sass
  style: compressed

# Custom Variables (accessible via site.custom)
custom:
  brand_color: "#2196F3"
  accent_color: "#FF5722"
  sidebar_enabled: true
  reading_time: true
  related_posts: 5
  newsletter_enabled: true
  mailchimp_url: "https://example.us1.list-manage.com/subscribe"
